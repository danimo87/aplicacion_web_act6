version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: biblioteca_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend_app
    container_name: nestjs_backend
    depends_on:
      - db
    ports:
      - "3000:3000"
    volumes:
      - ./backend_app:/app
      - /app/node_modules
    env_file:
      - ./backend_app/.env
    environment:
      - NODE_ENV=development

volumes:
  postgres_data: